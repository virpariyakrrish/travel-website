<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bus Booking - TravelEasy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        header {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        header nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            color: #667eea;
            margin: 0;
            padding: 0;
        }
        
        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 15px;
            background: #f0f0f0;
            border-radius: 20px;
        }
        
        .back-link:hover {
            background: #667eea;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .offer {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            color: #d63031;
        }
        
        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            margin-top: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .gender-section {
            margin: 15px 0;
        }
        
        .gender-options {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        
        .gender-options label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-top: 0;
        }
        
        .gender-options input {
            width: auto;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <h1>🚌 Bus Booking</h1>
            <a class="back-link" href="index.html">← Back</a>
        </nav>
    </header>

    <div class="container">
        <div class="offer">🎉 Special Offer: 10% discount for women!</div>

        <label>👤 Full Name:</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label>📞 Phone Number:</label>
        <input type="tel" id="phone" placeholder="Enter 10-digit mobile number">

        <label>✉️ Email Address:</label>
        <input type="email" id="email" placeholder="Enter your email address">

        <div class="gender-section">
            <label>👩‍🦰 Gender (for discount):</label>
            <div class="gender-options">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
                <label><input type="radio" name="gender" value="other"> Other</label>
            </div>
        </div>

        <label>📍 From:</label>
        <input type="text" id="from" placeholder="City name">

        <label>📍 To:</label>
        <input type="text" id="to" placeholder="City name">

        <label>📅 Travel Date:</label>
        <input type="date" id="date">

        <label>⏰ Departure Time:</label>
        <select id="time">
            <option>6:00 AM</option>
            <option>12:00 PM</option>
            <option>6:00 PM</option>
            <option>9:00 PM</option>
        </select>

        <label>🚌 Bus Type:</label>
        <select id="busType">
            <option value="500">Standard AC - ₹500</option>
            <option value="800">Luxury AC - ₹800</option>
            <option value="1200">Sleeper AC - ₹1200</option>
        </select>

        <button onclick="bookBus()">Proceed to Payment</button>
    </div>

    <script>
        // applyWomenOffer function
        function applyWomenOffer(price) {
            let gender = document.querySelector('input[name="gender"]:checked');
            if (gender && gender.value === "female") {
                let discountedPrice = price * 0.9;
                alert("🎉 Women's Special! 10% discount applied. Original: ₹" + price + " → New: ₹" + Math.round(discountedPrice));
                return Math.round(discountedPrice);
            }
            return price;
        }

        // Main booking function
        function bookBus() {
            // Get all values
            let name = document.getElementById('name').value.trim();
            let phone = document.getElementById('phone').value.trim();
            let email = document.getElementById('email').value.trim();
            let from = document.getElementById('from').value.trim();
            let to = document.getElementById('to').value.trim();
            let date = document.getElementById('date').value;
            let time = document.getElementById('time').value;
            let busSelect = document.getElementById('busType');
            let price = parseInt(busSelect.value);
            let busName = busSelect.options[busSelect.selectedIndex].text;
            
            // Validation checks
            if (!name) {
                alert("❌ Please enter your full name.");
                return;
            }
            
            if (!phone) {
                alert("❌ Please enter phone number.");
                return;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                alert("❌ Please enter a valid 10-digit phone number.");
                return;
            }
            
            if (!email) {
                alert("❌ Please enter email address.");
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                alert("❌ Please enter a valid email address (example: name@domain.com).");
                return;
            }
            
            if (!from) {
                alert("❌ Please enter departure city.");
                return;
            }
            
            if (!to) {
                alert("❌ Please enter destination city.");
                return;
            }
            
            if (!date) {
                alert("❌ Please select travel date.");
                return;
            }
            
            // Apply women discount
            let finalPrice = applyWomenOffer(price);
            
            // Create booking object
            let bookingData = {
                type: "bus",
                name: name,
                phone: phone,
                email: email,
                from: from,
                to: to,
                date: date,
                time: time,
                originalPrice: price,
                price: finalPrice,
                busName: busName,
                className: busName,
                discount: (price - finalPrice)
            };
            
            // Save to localStorage
            localStorage.setItem("tempBooking", JSON.stringify(bookingData));
            
            // Debug - check if saved
            console.log("Booking saved:", bookingData);
            console.log("localStorage:", localStorage.getItem("tempBooking"));
            
            // Show confirmation
            alert("✅ Booking details saved!\n\n" +
                  "Name: " + name + "\n" +
                  "From: " + from + " → To: " + to + "\n" +
                  "Date: " + date + "\n" +
                  "Time: " + time + "\n" +
                  "Bus: " + busName + "\n" +
                  "Total: ₹" + finalPrice + "\n\n" +
                  "Click OK to proceed to payment.");
            
            // ✅ IMPORTANT: Redirect to payment.html (ye sahi hai)
            window.location.href = "payment.html";
        }
        
        // Set minimum date to today
        let today = new Date().toISOString().split('T')[0];
        document.getElementById('date').min = today;
    </script>
</body>
</html>
